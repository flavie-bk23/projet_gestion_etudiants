<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}UniGestion{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;700;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0d14;
      --surface: #111520;
      --surface-2: #181d2a;
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.14);
      --text: #e8eaf0;
      --text-muted: rgba(232,234,240,0.42);
      --accent: #5b7fff;
      --accent-2: #8b5cf6;
      --green: #34d399;
      --amber: #fbbf24;
      --red: #f87171;
      --nav-h: 60px;
      --font-display: 'Cabinet Grotesk', sans-serif;
      --font-body: 'Instrument Sans', sans-serif;
      --radius: 14px;
      --radius-sm: 9px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAVBAR ── */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 200;
      height: var(--nav-h);
      background: rgba(10,13,20,0.82);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 clamp(16px, 4vw, 64px);
    }

    .nav-inner {
      max-width: 1160px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .nav-logo-mark {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 14px;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .nav-logo-label {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 16px;
      color: var(--text);
      letter-spacing: -0.4px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 2px;
      list-style: none;
    }

    .nav-links a {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 14px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      text-decoration: none;
      border-radius: var(--radius-sm);
      transition: color 0.2s, background 0.2s;
    }

    .nav-links a svg {
      width: 14px; height: 14px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    .nav-links a:hover { color: var(--text); background: var(--surface-2); }
    .nav-links a.active { color: var(--accent); background: rgba(91,127,255,0.1); }

    .nav-add {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 18px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      font-size: 13.5px;
      font-weight: 600;
      border-radius: var(--radius-sm);
      text-decoration: none;
      transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
      white-space: nowrap;
    }

    .nav-add:hover {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(91,127,255,0.35);
    }

    .nav-add svg {
      width: 13px; height: 13px;
      stroke: #fff; fill: none;
      stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
    }

    /* Burger */
    .burger {
      display: none;
      flex-direction: column;
      gap: 5px;
      width: 34px;
      height: 34px;
      justify-content: center;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
    }
    .burger span {
      display: block;
      width: 18px;
      height: 1.5px;
      background: var(--text-muted);
      border-radius: 2px;
      transition: transform 0.25s, opacity 0.25s;
    }
    .burger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .burger.open span:nth-child(2) { opacity: 0; }
    .burger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    .mobile-menu {
      display: none;
      flex-direction: column;
      gap: 4px;
      position: fixed;
      top: var(--nav-h);
      left: 0; right: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px clamp(16px, 4vw, 64px);
      z-index: 199;
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; font-size: 15px; font-weight: 500;
      color: var(--text-muted); text-decoration: none;
      border-radius: var(--radius-sm); transition: color 0.2s, background 0.2s;
    }
    .mobile-menu a svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .mobile-menu a:hover, .mobile-menu a.active { color: var(--accent); background: rgba(91,127,255,0.1); }

    /* ── MAIN ── */
    main { flex: 1; }

    /* ── FOOTER ── */
    .footer {
      border-top: 1px solid var(--border);
      padding: 24px clamp(16px, 4vw, 64px);
    }
    .footer-inner {
      max-width: 1160px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .footer-brand {
      display: flex; align-items: center; gap: 8px;
      font-family: var(--font-display); font-size: 13px; font-weight: 700;
      color: var(--text-muted);
    }
    .footer-copy { font-size: 12px; color: var(--text-muted); }
    .footer-links { display: flex; gap: 20px; }
    .footer-links a { font-size: 12px; color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
    .footer-links a:hover { color: var(--text); }

    @media (max-width: 768px) {
      .nav-links, .nav-add { display: none; }
      .burger { display: flex; }
      .footer-links { display: none; }
    }
  </style>
</head>
<body>

  <header class="navbar">
    <div class="nav-inner">
      <a href="/" class="nav-logo">
        <div class="nav-logo-mark">UG</div>
        <span class="nav-logo-label">UniGestion</span>
      </a>

      <nav>
        <ul class="nav-links">
          <li>
            <a href="/" id="link-home">
              <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
              Accueil
            </a>
          </li>
          <li>
            <a href="/liste" id="link-liste">
              <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
              Étudiants
            </a>
          </li>
          <li>
            <a href="/stats" id="link-stats">
              <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
              Statistiques
            </a>
          </li>
        </ul>
      </nav>

      <div style="display:flex;align-items:center;gap:10px;">
        <a href="/ajouter" class="nav-add" id="link-add">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Ajouter
        </a>
        <button class="burger" id="burger">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <div class="mobile-menu" id="mobile-menu">
    <a href="/" id="mob-home"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>Accueil</a>
    <a href="/liste" id="mob-liste"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Étudiants</a>
    <a href="/stats" id="mob-stats"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Statistiques</a>
    <a href="/ajouter" id="mob-add"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Ajouter un étudiant</a>
  </div>

  <main>{% block content %}{% endblock %}</main>

  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-brand">◈ UniGestion</div>
      <span class="footer-copy">© 2025 Plateforme universitaire</span>
      <div class="footer-links">
        <a href="/">Accueil</a>
        <a href="/liste">Étudiants</a>
        <a href="/stats">Stats</a>
        <a href="/ajouter">Ajouter</a>
      </div>
    </div>
  </footer>

  <script>
    const path = window.location.pathname;
    const navMap = {
      '/':        ['link-home', 'mob-home'],
      '/liste':   ['link-liste', 'mob-liste'],
      '/stats':   ['link-stats', 'mob-stats'],
      '/ajouter': ['link-add', 'mob-add'],
    };
    (navMap[path] || []).forEach(id => {
      const el = document.getElementById(id);
      if (el) el.classList.add('active');
    });

    const burger = document.getElementById('burger');
    const mobileMenu = document.getElementById('mobile-menu');
    burger.addEventListener('click', () => {
      const open = mobileMenu.classList.toggle('open');
      burger.classList.toggle('open', open);
    });
    document.addEventListener('click', e => {
      if (!burger.contains(e.target) && !mobileMenu.contains(e.target)) {
        mobileMenu.classList.remove('open');
        burger.classList.remove('open');
      }
    });
    mobileMenu.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', () => {
        mobileMenu.classList.remove('open');
        burger.classList.remove('open');
      });
    });
  </script>

</body>
</html>
